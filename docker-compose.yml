version: "3.8"
services:
  activity_app:
    build: .
    ports:
      - "5000:8080"
    volumes:
      - ./activity_web/runtime:/data/activity_runtime
      - ./models:/app/models
    environment:
      - ACTIVITY_WEB_RUNTIME_DIR=/data/activity_runtime
      - PORT=8080
    restart: unless-stopped
